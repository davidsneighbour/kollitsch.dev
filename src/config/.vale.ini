StylesPath = vale
MinAlertLevel = suggestion # suggestion, warning, error
Packages = https://github.com/davidsneighbour/dnb-vale-config/releases/latest/download/DNB.zip

Vocab = kollitsch-dev

[*.md]
# Preserve DNB Hugo template patterns and add .astro file-extension ignore.
# The .astro false positive: Vale.Terms flags `astro` in layout file paths.
TokenIgnores = ({{[%<] .* [%>]}}.*?{{[%<] ?/.* [%>]}}),(\[.+\]\({{< .+ >}}\)),[^\S\r\n]({{[%<] \w+ .+ [%>]}})\s,[^\S\r\n]({{[%<](?:/\*) .* (?:\*/)[%>]}})\s,(\S+\.astro)
# Vale.Terms fires on `.astro` file extensions in frontmatter layout paths.
# The term `Astro` (capitalisation) is enforced by Vale.Spelling instead.
Vale.Terms = NO
